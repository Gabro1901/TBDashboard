<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bilancio Automatico — Redazione automatica di Stato Patrimoniale, Conto Economico e Rendiconto Finanziario con dashboard KPI personalizzabile.">
  <title>Bilancio Automatico — Financial Reporting</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/pages.css?v=2">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Driver.js for Interactive Tours -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css"/>
  <script src="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.js.iife.js"></script>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📊</text></svg>">
</head>
<body>
  <!-- Error Logger for Debugging -->
  <script>
    window.addEventListener('error', function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;font-size:16px;"><b>Global Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;font-size:16px;"><b>Unhandled Promise Rejection:</b> ' + (e.reason ? e.reason.message || e.reason : 'Unknown') + '</div>';
    });
  </script>


  <div class="app-layout">

    <!-- ═══ Enterprise Top Navigation Shell ═══ -->
    <header class="app-header">
      <div class="app-header-left">
        <div class="app-logo">
          <i data-lucide="bar-chart-2" class="logo-icon"></i>
          <span class="logo-text">Bilancio Automatico</span>
        </div>
        <div class="app-divider"></div>
        <nav class="app-nav" id="top-nav">
          <div class="nav-item active" data-page="input" id="nav-input">
            <i data-lucide="list"></i>
            <span>Verifica</span>
          </div>
          <div class="nav-item" data-page="opening" id="nav-opening">
            <i data-lucide="building-2"></i>
            <span>Saldi Iniziali</span>
          </div>
          <div class="nav-item" data-page="documents" id="nav-documents">
            <i data-lucide="file-text"></i>
            <span>Documenti</span>
          </div>
          <div class="nav-item" data-page="dashboard" id="nav-dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span>Dashboard</span>
          </div>
          <div class="nav-item" data-page="forecast" id="nav-forecast">
            <i data-lucide="trending-up"></i>
            <span>Forecast</span>
          </div>
        </nav>
      </div>
      <div class="app-header-right">
        <div class="nav-item" data-page="settings" id="nav-settings" title="Impostazioni">
          <i data-lucide="settings"></i>
        </div>
        <div class="nav-item" data-page="ailogs" id="nav-ailogs" title="Log AI">
          <i data-lucide="bot"></i>
        </div>
      </div>
    </header>

    <!-- ═══ Main Content Area ═══ -->
    <main class="main-content" id="main-content">

      <!-- Input Page -->
      <div class="page-section active" id="page-input">
        <div class="page-container">
          <!-- Rendered by trialBalance.js -->
        </div>
      </div>

      <!-- Opening Balances Page -->
      <div class="page-section" id="page-opening">
        <div class="page-container">
          <!-- Rendered by app.js -->
        </div>
      </div>

      <!-- Documents Page -->
      <div class="page-section" id="page-documents">
        <div class="page-container">
          <!-- Rendered by app.js + individual document modules -->
        </div>
      </div>

      <!-- Dashboard Page -->
      <div class="page-section" id="page-dashboard">
        <div class="page-container">
          <!-- Rendered by dashboard.js -->
        </div>
      </div>

      <!-- Forecast Page -->
      <div class="page-section" id="page-forecast">
        <div class="page-container">
          <!-- Rendered by forecast.js -->
        </div>
      </div>

      <!-- Settings Page -->
      <div class="page-section" id="page-settings">
        <div class="page-container">
          <!-- Rendered by app.js -->
        </div>
      </div>

      <!-- AI Logs Page -->
      <div class="page-section" id="page-ailogs">
        <div class="page-container">
          <!-- Rendered by aiLogs.js -->
        </div>
      </div>

    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Script (ES Module) -->
  <script type="module" src="js/app.js?v=2"></script>

</body>
</html>
